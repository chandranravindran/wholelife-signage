<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WholeLife Digital Signage</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--wl-purple:#62457C;--wl-orange:#DD6D09;--wl-green:#B7B800;--wl-light:#F7F5FA;--wl-border:#E8E2EF}
body{font-family:'Outfit',sans-serif;background:#ffffff;width:1920px;height:1080px;overflow:hidden;color:#2a2a2a}
.header{position:absolute;top:0;left:0;right:0;height:80px;background:#fff;display:flex;align-items:center;padding:0 56px;border-bottom:3px solid var(--wl-purple);z-index:100}
.header-right{margin-left:auto;display:flex;align-items:center;gap:20px}
.tagline{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#888;font-weight:500}
.tagline span{color:var(--wl-orange);font-weight:700}
.cat-badge{padding:8px 26px;border-radius:30px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;background:var(--wl-purple)}
.content{position:absolute;top:80px;left:0;right:0;bottom:80px;display:grid;grid-template-columns:50% 50%}
.info-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 60px;background:#ffffff;text-align:center}
.p-brand{font-size:14px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--wl-orange);margin-bottom:12px}
.p-name{font-size:64px;font-weight:700;line-height:1.05;margin-bottom:6px;color:var(--wl-purple)}
.p-size{font-size:20px;font-weight:300;color:#999;margin-bottom:20px;letter-spacing:1px}
.divider{width:64px;height:4px;border-radius:2px;margin-bottom:22px;background:linear-gradient(90deg,var(--wl-green),var(--wl-orange))}
.p-subtitle{font-size:18px;font-weight:400;color:#666;max-width:520px;line-height:1.6;margin-bottom:38px}
.price-row{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:36px}
.price-dollar{font-size:40px;font-weight:800;color:var(--wl-orange);line-height:1}
.price-whole{font-size:88px;font-weight:900;color:var(--wl-orange);line-height:1;letter-spacing:-3px}
.price-cents{font-size:40px;font-weight:800;color:var(--wl-orange);align-self:flex-start;margin-top:14px}
.price-box{display:flex;align-items:baseline}
.was-wrap{display:flex;flex-direction:column;gap:6px;padding-left:10px}
.was-price{font-size:20px;color:#bbb;text-decoration:line-through;text-decoration-color:#e03e3e;text-decoration-thickness:2px}
.save-badge{padding:10px 20px;background:#e03e3e;border-radius:8px;font-size:18px;font-weight:900;color:#fff;line-height:1.1;text-align:center}
.price-ask{font-size:24px;font-weight:600;color:var(--wl-purple);padding:16px 36px;border:2px solid var(--wl-purple);border-radius:10px}
.tags{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.tag{padding:10px 28px;border-radius:8px;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;background:var(--wl-purple);box-shadow:0 2px 8px rgba(98,69,124,0.25)}
.img-panel{display:flex;align-items:center;justify-content:center;position:relative;background:var(--wl-light);border-left:1px solid var(--wl-border)}
.img-panel::after{content:'';position:absolute;bottom:48px;left:50%;transform:translateX(-50%);width:340px;height:60px;border-radius:50%;background:radial-gradient(ellipse,rgba(0,0,0,0.08) 0%,transparent 70%)}
.img-panel img{position:relative;z-index:1;max-width:76%;max-height:78%;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.12)) drop-shadow(0 16px 32px rgba(0,0,0,0.10)) drop-shadow(0 32px 56px rgba(0,0,0,0.07))}
.img-placeholder{font-size:140px;opacity:.06}
.promo-slide{position:absolute;top:80px;left:0;right:0;bottom:80px;display:flex;align-items:center;justify-content:center;background:#000}
.promo-slide img{width:100%;height:100%;object-fit:contain}
.footer{position:absolute;bottom:0;left:0;right:0;height:80px;background:#fff;border-top:3px solid var(--wl-purple);display:flex;flex-direction:column;z-index:100;overflow:hidden}
.footer-top{height:34px;background:var(--wl-purple);display:flex;align-items:center;padding:0 40px}
.footer-dots{margin-left:auto;display:flex;gap:6px;margin-right:18px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all .3s}
.dot.on{width:24px;border-radius:4px;background:#fff}
.ft-clock{font-size:16px;font-weight:700;color:rgba(255,255,255,0.7);font-variant-numeric:tabular-nums}
.footer-band{flex:1;background:var(--wl-light);display:flex;align-items:center;overflow:hidden}
.ticker-track{display:flex;align-items:center;gap:72px;white-space:nowrap;animation:tickScroll 55s linear infinite}
@keyframes tickScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:flex;align-items:center;gap:14px;font-size:18px;font-weight:400;color:#888}
.tick-item .hi{color:var(--wl-purple);font-weight:700}
.tick-dot{width:5px;height:5px;border-radius:50%;background:var(--wl-orange);flex-shrink:0}
.progress{position:absolute;top:0;left:0;height:4px;background:var(--wl-orange);width:0;z-index:300}
.progress.run{transition:width var(--dur) linear;width:100%}
.anim{opacity:0;transform:translateY(24px)}
.anim.in{opacity:1;transform:translateY(0)}
.anim.out{opacity:0;transform:translateY(-16px)}
.anim.d1{transition:opacity .5s cubic-bezier(.16,1,.3,1) 0s,transform .5s cubic-bezier(.16,1,.3,1) 0s}
.anim.d2{transition:opacity .55s cubic-bezier(.16,1,.3,1) .06s,transform .55s cubic-bezier(.16,1,.3,1) .06s}
.anim.d3{transition:opacity .55s cubic-bezier(.16,1,.3,1) .12s,transform .55s cubic-bezier(.16,1,.3,1) .12s}
.anim.d4{transition:opacity .55s cubic-bezier(.16,1,.3,1) .18s,transform .55s cubic-bezier(.16,1,.3,1) .18s}
.anim.d5{transition:opacity .6s cubic-bezier(.16,1,.3,1) .22s,transform .6s cubic-bezier(.16,1,.3,1) .22s}
.anim.d6{transition:opacity .6s cubic-bezier(.16,1,.3,1) .28s,transform .6s cubic-bezier(.16,1,.3,1) .28s}
.anim.d7{transition:opacity .65s cubic-bezier(.16,1,.3,1) .34s,transform .65s cubic-bezier(.16,1,.3,1) .34s}
.anim.out.d1,.anim.out.d2,.anim.out.d3,.anim.out.d4,.anim.out.d5,.anim.out.d6,.anim.out.d7{transition:opacity .18s ease-in,transform .18s ease-in}
.img-anim{opacity:0;transform:scale(.86) translateX(50px)}
.img-anim.in{opacity:1;transform:scale(1) translateX(0);transition:opacity .85s cubic-bezier(.16,1,.3,1) .08s,transform .85s cubic-bezier(.16,1,.3,1) .08s}
.img-anim.out{opacity:0;transform:scale(.92) translateX(-30px);transition:opacity .18s ease-in,transform .18s ease-in}
.promo-anim{opacity:0;width:100%;height:100%}
.promo-anim.in{opacity:1;transition:opacity .5s ease .05s}
.promo-anim.out{opacity:0;transition:opacity .2s ease-in}
@keyframes priceIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.price-slam{animation:priceIn .5s cubic-bezier(.16,1,.3,1) .3s both}
@keyframes badgePunch{0%{transform:scale(0) rotate(-15deg);opacity:0}55%{transform:scale(1.2) rotate(3deg);opacity:1}80%{transform:scale(.95)}100%{transform:scale(1) rotate(0);opacity:1}}
.badge-punch{animation:badgePunch .45s cubic-bezier(.16,1,.3,1) .6s both}
@keyframes wasFade{from{opacity:0}to{opacity:1}}
.was-fade{animation:wasFade .3s ease .45s both}
@media(max-width:1920px){body{transform-origin:top left;transform:scale(calc(100vw/1920))}}
</style>
</head>
<body>
<div class="progress" id="progress"></div>
<div class="header">
  <img src="https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/images/wholelife-logo-wide.jpg" alt="WholeLife" style="height:48px;" onerror="this.style.display='none'">
  <div class="header-right">
    <div class="tagline">GET WELL <span>·</span> STAY WELL <span>·</span> LIVE WELL <span>·</span> BE WELL</div>
    <div class="cat-badge" id="catBadge">FEATURED</div>
  </div>
</div>

<div class="content" id="productSlide">
  <div class="info-panel">
    <div class="p-brand anim d1" id="pBrand"></div>
    <div class="p-name anim d2" id="pName"></div>
    <div class="p-size anim d3" id="pSize"></div>
    <div class="divider anim d4"></div>
    <div class="p-subtitle anim d5" id="pSub"></div>
    <div class="price-row anim d6" id="priceRow"></div>
    <div class="tags anim d7" id="pTags"></div>
  </div>
  <div class="img-panel" id="imgPanel">
    <div id="imgBox" class="img-anim"></div>
  </div>
</div>

<div class="promo-slide" id="promoSlide" style="display:none;">
  <div id="promoBox" class="promo-anim"></div>
</div>

<div class="footer">
  <div class="footer-top">
    <img src="https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/images/wholelife-logo-wide.jpg" alt="WholeLife" style="height:20px;filter:brightness(0) invert(1);opacity:.85;" onerror="this.style.display='none'">
    <div class="footer-dots" id="dots"></div>
    <div class="ft-clock" id="clock"></div>
  </div>
  <div class="footer-band">
    <div class="ticker-track" id="ticker"></div>
  </div>
</div>

<script>
// ── CONFIG — update this if you change your GitHub repo ──
const GITHUB_RAW = "https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/products.json";
const REFRESH_MS = 5 * 60 * 1000; // reload data every 5 minutes

let slides = [];
let settings = {};
let cur = 0;
let slideTimer = null;

// ── Load data from GitHub ──
async function loadData() {
  try {
    const r = await fetch(GITHUB_RAW + "?t=" + Date.now()); // bust cache
    const d = await r.json();
    if (d.slides && d.slides.length) {
      slides = d.slides;
      settings = d.settings || {};
      rebuildDots();
      console.log("✅ Loaded", slides.length, "slides from GitHub");
    }
  } catch(e) {
    console.warn("Could not load products.json:", e);
  }
}

function rebuildDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  slides.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' on' : '');
    dotsEl.appendChild(d);
  });
}

// ── Show slide ──
function show(idx) {
  if (!slides.length) return;
  const p = slides[idx];
  const isPromo = p.type === 'promo';
  const SLIDE_SEC = settings.slide_seconds || 8;
  const prodSlide = document.getElementById('productSlide');
  const promoSlide = document.getElementById('promoSlide');

  document.querySelectorAll('.anim').forEach(e=>{e.classList.remove('in');e.classList.add('out')});
  document.getElementById('imgBox').classList.remove('in');
  document.getElementById('imgBox').classList.add('out');
  document.getElementById('promoBox').classList.remove('in');
  document.getElementById('promoBox').classList.add('out');

  setTimeout(()=>{
    if(isPromo){
      prodSlide.style.display='none';promoSlide.style.display='flex';
      document.getElementById('catBadge').textContent='PROMOTION';
      document.getElementById('catBadge').style.background='#DD6D09';
      const pb=document.getElementById('promoBox');pb.innerHTML='';
      if(p.youtube_url && p.video_type==='mp4'){
        const vid=document.createElement('video');
        vid.src=p.youtube_url;
        vid.style.cssText='width:100%;height:100%;object-fit:contain;background:#000;';
        vid.autoplay=true;vid.loop=true;vid.muted=false;vid.playsInline=true;
        vid.controls=false;
        pb.appendChild(vid);
        vid.play().catch(()=>{vid.muted=true;vid.play();});
      } else if(p.youtube_url){
        const iframe=document.createElement('iframe');
        iframe.src=p.youtube_url;
        iframe.style.cssText='width:100%;height:100%;border:none;';
        iframe.allow='autoplay;fullscreen';
        iframe.allowFullscreen=true;
        pb.appendChild(iframe);
      } else if(p.display_image||p.image_url){const img=document.createElement('img');img.src=p.display_image||p.image_url;img.alt=p.name;pb.appendChild(img);}
      pb.classList.remove('out');requestAnimationFrame(()=>pb.classList.add('in'));
    } else {
      prodSlide.style.display='grid';promoSlide.style.display='none';
      const energyCats=['energy','promo'];
      document.getElementById('catBadge').textContent=(p.category||'FEATURED').toUpperCase();
      document.getElementById('catBadge').style.background=energyCats.includes(p.category)?'#DD6D09':'#62457C';
      document.getElementById('pBrand').textContent=(p.brand||'').toUpperCase();
      const nm=(p.name||'').match(/^(.+?)\s+(\d+\s*(?:tablets?|capsules?|caps?|g|mg|ml|serves?|softgels?).*)$/i);
      if(nm){document.getElementById('pName').textContent=nm[1];document.getElementById('pSize').textContent=nm[2];}
      else{document.getElementById('pName').textContent=p.name;document.getElementById('pSize').textContent='';}
      document.getElementById('pSub').textContent=p.subtitle||'';
      const pr=document.getElementById('priceRow');pr.innerHTML='';
      const pn=parseFloat(p.price),wn=parseFloat(p.was_price);
      if(pn>0){
        const d=Math.floor(pn),c=Math.round((pn-d)*100).toString().padStart(2,'0');
        const box=document.createElement('div');box.className='price-box price-slam';
        box.innerHTML='<span class="price-dollar">$</span><span class="price-whole">'+d+'</span><span class="price-cents">.'+c+'</span>';
        pr.appendChild(box);
        if(wn>0&&wn>pn){
          const wrap=document.createElement('div');wrap.className='was-wrap';
          const w=document.createElement('span');w.className='was-price was-fade';w.textContent='WAS $'+wn.toFixed(2);
          const s=document.createElement('div');s.className='save-badge badge-punch';s.innerHTML='SAVE<br>$'+Math.round(wn-pn)+'!';
          wrap.appendChild(w);wrap.appendChild(s);pr.appendChild(wrap);
        }
      } else {
        const a=document.createElement('div');a.className='price-ask';a.textContent='Ask in store';pr.appendChild(a);
      }
      const tg=document.getElementById('pTags');tg.innerHTML='';
      if(p.tags){(p.tags||'').split(',').map(t=>t.trim()).filter(Boolean).slice(0,4).forEach(t=>{const s=document.createElement('span');s.className='tag';s.textContent=t;tg.appendChild(s);});}
      const ib=document.getElementById('imgBox');ib.innerHTML='';
      const imgUrl=p.display_image||p.image_url;
      if(imgUrl){const img=document.createElement('img');img.src=imgUrl;img.alt=p.name;img.referrerPolicy='no-referrer';img.onerror=function(){this.parentElement.innerHTML='<div class="img-placeholder">📦</div>'};ib.appendChild(img);}
      else{ib.innerHTML='<div class="img-placeholder">📦</div>';}
      document.querySelectorAll('.anim').forEach(e=>e.classList.remove('out'));
      ib.classList.remove('out');
      requestAnimationFrame(()=>{document.querySelectorAll('.anim').forEach(e=>e.classList.add('in'));ib.classList.add('in');});
    }
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
    resetProg(SLIDE_SEC);setTimeout(()=>startProg(SLIDE_SEC),40);
  },240);
  cur=idx;
}

function next(){
  if(!slides.length) return;
  show((cur+1)%slides.length);
}
function resetProg(sec){const b=document.getElementById('progress');b.classList.remove('run');b.style.width='0';b.style.transition='none';b.style.setProperty('--dur',sec+'s');}
function startProg(sec){const b=document.getElementById('progress');b.style.transition='width '+sec+'s linear';requestAnimationFrame(()=>{b.classList.add('run');b.style.width='100%';});}

// ── Ticker ──
function buildTicker(msgs) {
  const tk=document.getElementById('ticker');
  tk.innerHTML='';
  const def=[
    {text:"Healthy living every day",highlight:"Ask our pharmacist"},
    {text:"Australia's largest range of",highlight:"health foods & organics"},
    {text:"Get Well · Stay Well ·",highlight:"Live Well · Be Well"},
    {text:"Book your",highlight:"Flu Vaccination","after":"in-store today"},
  ];
  const list = (msgs && msgs.length) ? msgs : def;
  [...list,...list].forEach(m=>{
    const s=document.createElement('span');s.className='tick-item';
    s.innerHTML='<span class="tick-dot"></span>'+m.text+' <span class="hi">'+(m.highlight||'')+'</span>'+(m.after?' '+m.after:'');
    tk.appendChild(s);
  });
}

// ── Clock ──
function tickClock(){const n=new Date();document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
setInterval(tickClock,10000);tickClock();

// ── Boot ──
async function boot() {
  await loadData();
  buildTicker(settings.ticker_messages);
  rebuildDots();
  if(slides.length){
    show(0);
    const sec = settings.slide_seconds || 8;
    slideTimer = setInterval(next, sec * 1000);
  }
  // Reload data every 5 minutes
  setInterval(async()=>{
    await loadData();
    buildTicker(settings.ticker_messages);
  }, REFRESH_MS);
}

boot();
</script>
</body>
</html>
