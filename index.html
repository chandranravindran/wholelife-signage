<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WholeLife Display</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #fff; font-family: 'Nunito', sans-serif;
  }

  /* ── Slide wrapper ── */
  .slide-container { width: 100vw; height: 100vh; position: relative; }

  .slide {
    position: absolute; inset: 0;
    display: none; opacity: 0;
    transition: opacity .7s ease;
    z-index: 1;
  }
  .slide.active  { display: flex; }
  .slide.visible { opacity: 1; z-index: 2; }

  /* ── Product slide ── */
  .product-slide {
    display: flex; flex-direction: row;
    background: #ffffff; width: 100%; height: 100%;
    padding-bottom: 72px;
  }

  .left-panel {
    flex: 0 0 54%;
    padding: 48px 40px 48px 80px;
    display: flex; flex-direction: column; justify-content: center;
    overflow: hidden;
  }

  .meta-zone { margin-bottom: 14px; min-height: 66px; }
  .cat-label {
    font-size: 17px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: #B7B800; margin-bottom: 6px; min-height: 24px;
  }
  .brand-label {
    font-size: 26px; font-weight: 700; color: #62457C;
  }

  .name-zone { margin-bottom: 20px; min-height: 80px; }
  .product-name {
    font-size: clamp(34px, 4.8vw, 68px);
    line-height: 1.1; color: #1a1a1a;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-name .light { font-weight: 300; }
  .product-name .bold  { font-weight: 900; }

  .desc-zone { margin-bottom: 16px; }
  .subtitle {
    font-size: 22px; color: #555; line-height: 1.4; font-weight: 400;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .description {
    font-size: 18px; color: #777; line-height: 1.5; margin-top: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .price-zone { margin-bottom: 20px; min-height: 80px; }
  .was-row { margin-bottom: 4px; }
  .price-now {
    font-size: clamp(60px, 8vw, 100px); font-weight: 900;
    color: #DD6D09; line-height: 1;
  }
  .price-now .dollar { font-size: .52em; vertical-align: super; }
  .price-was {
    font-size: 26px; color: #bbb; text-decoration: line-through; margin-right: 10px;
  }
  .price-save {
    display: inline-block; background: #DD6D09; color: #fff;
    font-size: 17px; font-weight: 700; padding: 4px 14px; border-radius: 20px;
  }

  .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    background: #f0ecf7; color: #62457C;
    padding: 6px 16px; border-radius: 20px;
    font-size: 16px; font-weight: 700;
  }

  /* Right panel — fixed 46%, image always centred */
  .right-panel {
    flex: 0 0 46%;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 48px 48px 24px;
    position: relative; overflow: hidden;
  }
  .right-panel::before {
    content: '';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 80%; height: 80%;
    background: radial-gradient(ellipse, rgba(98,69,124,.06) 0%, transparent 68%);
    border-radius: 50%;
  }
  .product-image {
    max-width: 90%; max-height: calc(100vh - 200px);
    width: auto; height: auto;
    object-fit: contain; position: relative; z-index: 1;
    filter: drop-shadow(0 20px 44px rgba(98,69,124,.13));
  }
  .watermark { display: none; }

  /* ── Promo slide ── */
  .promo-slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; padding-bottom: 72px;
  }
  .promo-slide img {
    width: 100%; height: 100%; object-fit: contain;
  }
  .promo-slide iframe {
    position: absolute; top: 0; left: 0;
    width: 100%; height: calc(100% - 72px); border: none;
  }
  .promo-slide video {
    width: 100%; height: calc(100% - 72px); object-fit: contain;
  }

  /* ── Transition screen ── */
  .transition-slide {
    background: #62457C;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    position: absolute; inset: 0;
  }
  .transition-slide .brand-text {
    color: #fff; font-size: 48px; font-weight: 900; letter-spacing: 1px;
  }
  .transition-slide .brand-sub {
    color: rgba(255,255,255,.6); font-size: 20px; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase; margin-top: -18px;
  }
  .loading-bar-wrap {
    width: 280px; height: 4px; background: rgba(255,255,255,.2);
    border-radius: 2px; overflow: hidden;
  }
  .loading-bar {
    height: 100%; width: 0%; background: #fff; border-radius: 2px;
    animation: loadBar 1.2s ease-in-out forwards;
  }
  @keyframes loadBar { to { width: 100%; } }

  /* ── Ticker ── */
  .ticker-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 72px; background: #62457C;
    display: flex; align-items: center; overflow: hidden; z-index: 100;
  }
  .ticker-brand {
    flex: 0 0 auto; padding: 0 28px;
    display: flex; align-items: center; gap: 14px;
    border-right: 1px solid rgba(255,255,255,.2); height: 100%;
  }
  .ticker-brand img { display: none; }
  .ticker-brand .store-name { font-size: 20px; font-weight: 900; color: #fff; white-space: nowrap; letter-spacing: .5px; }
  .ticker-brand .store-tag  { font-size: 13px; color: rgba(255,255,255,.65); white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; }
  .ticker-scroll-wrap { flex: 1; overflow: hidden; height: 100%; display: flex; align-items: center; }
  .ticker-track {
    display: flex; align-items: center;
    white-space: nowrap;
    animation: tickerMove 30s linear infinite;
  }
  .ticker-item {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0 32px; font-size: 20px; color: rgba(255,255,255,.85); font-weight: 600;
  }
  .ticker-item .hi { color: #fff; font-weight: 800; }
  .ticker-sep {
    display: inline-block; width: 5px; height: 5px;
    background: rgba(255,255,255,.4); border-radius: 50%;
  }
  @keyframes tickerMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Loading overlay */
  #loadOverlay {
    position: fixed; inset: 0; background: #62457C;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; z-index: 999;
  }
  #loadOverlay img { height: 70px; filter: brightness(0) invert(1); }
  #loadOverlay p { color: rgba(255,255,255,.7); font-size: 16px; }
</style>
</head>
<body>

<!-- Loading overlay shown until data is ready -->
<div id="loadOverlay">
  <img src="images/wholelife-logo-wide.jpg" alt="WholeLife" onerror="this.style.display='none'">
  <p>Loading display…</p>
</div>

<div class="slide-container" id="slideContainer"></div>

<div class="ticker-footer">
  <div class="ticker-brand">
    <img src="images/wholelife-logo-wide.jpg" alt="WholeLife" onerror="this.style.display='none'">
    <div>
      <div class="store-name" id="storeName">WholeLife</div>
      <div class="store-tag"  id="storeTag">Pharmacy &amp; Healthfoods</div>
    </div>
  </div>
  <div class="ticker-scroll-wrap">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<script>
// ── Config ──
const PRODUCTS_URL = 'products.json';
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes

let slides = [];
let settings = {};
let current = 0;
let slideTimer = null;

// ── Load data from GitHub ──
async function loadData() {
  try {
    const resp = await fetch(PRODUCTS_URL + '?_=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    slides = data.slides || [];
    settings = data.settings || {};
    return true;
  } catch(e) {
    console.error('Failed to load products.json:', e);
    return false;
  }
}

// ── Build ticker ──
function buildTicker() {
  const msgs = settings.ticker_messages || [
    { text: 'Get Well · Stay Well · Live Well · Be Well' },
    { text: "Australia's largest range of", highlight: 'health foods & organics' },
    { text: 'Ask our', highlight: 'pharmacist', after: 'today' },
    { text: 'Book your', highlight: 'Flu Vaccination', after: 'in-store' },
    { text: '', highlight: 'Guaranteed best prices' },
    { text: 'Vegan · Organic · Gluten Free · Natural' },
  ];

  document.getElementById('storeName').textContent = settings.store_name || 'WholeLife';
  document.getElementById('storeTag').textContent  = (settings.store_tagline || 'Pharmacy & Healthfoods');

  const items = msgs.map(m => {
    let html = '<span class="ticker-item">';
    if (m.text)      html += m.text + ' ';
    if (m.highlight) html += '<span class="hi">' + m.highlight + '</span> ';
    if (m.after)     html += m.after;
    html += '</span><span class="ticker-sep"></span>';
    return html;
  });
  const track = document.getElementById('tickerTrack');
  track.innerHTML = items.join('') + items.join(''); // doubled for seamless loop
}

// ── Build product slide HTML ──
function buildProductSlide(p, idx) {
  const imgSrc = p.display_image || p.image_url || '';
  const imgHtml = imgSrc
    ? `<img src="${imgSrc}" class="product-image" alt="${esc(p.name)}" onerror="this.style.display='none'">`
    : '';

  const words = (p.name || '').split(' ');
  const half  = Math.floor(words.length / 2);
  const nameHtml = words.length > 1
    ? `<span class="light">${esc(words.slice(0, half).join(' '))}</span><span class="bold">${esc(words.slice(half).join(' '))}</span>`
    : `<span class="bold">${esc(p.name)}</span>`;

  let priceHtml = '';
  if (p.price) {
    let wasHtml = '';
    if (p.was_price) {
      const save = (parseFloat(p.was_price) - parseFloat(p.price)).toFixed(2);
      wasHtml = `<div class="was-row"><span class="price-was">$${esc(p.was_price)}</span><span class="price-save">Save $${save}</span></div>`;
    }
    priceHtml = `<div class="price-zone">${wasHtml}<span class="price-now"><span class="dollar">$</span>${esc(p.price)}</span></div>`;
  }

  const tagHtml = (p.tags || '')
    .split(',').map(t => t.trim()).filter(Boolean)
    .map(t => `<span class="tag">${esc(t)}</span>`).join('');

  const descHtml = (p.subtitle || p.description) ? `
    <div class="desc-zone">
      ${p.subtitle    ? `<div class="subtitle">${esc(p.subtitle)}</div>` : ''}
      ${p.description ? `<div class="description">${esc(p.description)}</div>` : ''}
    </div>` : '';

  return `
    <div class="product-slide">
      <div class="left-panel">
        <div class="meta-zone">
          <div class="cat-label">${esc(p.category || '')}</div>
          <div class="brand-label">${esc(p.brand || '')}</div>
        </div>
        <div class="name-zone">
          <div class="product-name">${nameHtml}</div>
        </div>
        ${descHtml}
        ${priceHtml}
        ${tagHtml ? `<div class="tags">${tagHtml}</div>` : ''}
      </div>
      <div class="right-panel">
        <div class="watermark"></div>
        ${imgHtml}
      </div>
    </div>`;
}

// ── Build promo slide HTML ──
function buildPromoSlide(p) {
  if (p.youtube_url) {
    if (p.video_type === 'mp4') {
      return `<div class="promo-slide"><video src="${esc(p.youtube_url)}" preload="auto" muted playsinline></video></div>`;
    }
    return `<div class="promo-slide"><iframe src="${esc(p.youtube_url)}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
  }
  const img = p.display_image || p.image_url || '';
  if (img) {
    return `<div class="promo-slide"><img src="${esc(img)}" alt="${esc(p.name)}"></div>`;
  }
  return `<div class="promo-slide" style="color:#fff;font-size:32px;font-weight:700">${esc(p.name)}</div>`;
}

// ── Render all slides into DOM ──
function renderSlides() {
  const container = document.getElementById('slideContainer');
  container.innerHTML = '';

  slides.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.dataset.index = idx;
    div.dataset.type  = p.type || 'product';
    div.dataset.duration = p.duration || 60;

    if (p.type === 'promo') {
      div.innerHTML = buildPromoSlide(p);
    } else {
      div.innerHTML = buildProductSlide(p, idx);
    }
    container.appendChild(div);
  });

  // Transition slide
  const ts = document.createElement('div');
  ts.className = 'slide';
  ts.id = 'transitionSlide';
  ts.dataset.type = 'transition';
  ts.innerHTML = `
    <div class="transition-slide">
      <div class="brand-text">WholeLife</div>
      <div class="brand-sub">Pharmacy &amp; Healthfoods</div>
      <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
    </div>`;
  container.appendChild(ts);
}

// ── Show a slide ──
function showSlide(idx, useTransition) {
  const allSlides = document.querySelectorAll('.slide:not(#transitionSlide)');
  if (!allSlides.length) return;
  const outgoing = allSlides[idx === current ? (idx + 1) % allSlides.length : current];

  if (useTransition) {
    allSlides.forEach(s => {
      s.classList.remove('visible');
      const v = s.querySelector('video');
      if (v) { v.pause(); }
      setTimeout(() => s.classList.remove('active'), 700);
    });
    const ts = document.getElementById('transitionSlide');
    const bar = document.getElementById('loadingBar');
    if (ts) {
      ts.classList.add('active');
      requestAnimationFrame(() => requestAnimationFrame(() => ts.classList.add('visible')));
      if (bar) { bar.style.animation = 'none'; bar.offsetHeight; bar.style.animation = 'loadBar 1.2s ease-in-out forwards'; }

      const nextVideo = allSlides[idx] ? allSlides[idx].querySelector('video') : null;
      const revealSlide = () => {
        ts.classList.remove('visible');
        setTimeout(() => {
          ts.classList.remove('active');
          if (allSlides[idx]) {
            allSlides[idx].classList.add('active');
            requestAnimationFrame(() => requestAnimationFrame(() => allSlides[idx].classList.add('visible')));
          }
        }, 700);
      };
      if (nextVideo) {
        let revealed = false;
        const doReveal = () => { if (!revealed) { revealed = true; revealSlide(); } };
        nextVideo.addEventListener('canplay', doReveal, { once: true });
        setTimeout(doReveal, 3000);
      } else {
        setTimeout(revealSlide, 1200);
      }
    }
  } else {
    if (allSlides[idx]) {
      allSlides[idx].classList.add('active');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        allSlides[idx].classList.add('visible');
        if (outgoing && outgoing !== allSlides[idx]) {
          outgoing.classList.remove('visible');
          setTimeout(() => {
            outgoing.classList.remove('active');
            const v = outgoing.querySelector('video');
            if (v) { v.pause(); }
          }, 700);
        }
      }));
    }
  }
}

function scheduleNext(slideEl) {
  const video  = slideEl ? slideEl.querySelector('video') : null;
  const iframe = slideEl ? slideEl.querySelector('iframe') : null;

  if (video) {
    video.currentTime = 0;
    video.play().catch(() => {});
    let done = false;
    const advance = () => { if (!done) { done = true; nextSlide(); } };
    video.onended = advance;
    setTimeout(advance, 120000);
    return;
  }
  if (iframe) {
    const duration = parseInt(slideEl.dataset.duration || '60', 10);
    setTimeout(nextSlide, duration * 1000);
    return;
  }
  const isPromo = slideEl && slideEl.dataset.type === 'promo';
  const sec = (settings.slide_seconds || 8) * (isPromo ? 2 : 1) * 1000;
  setTimeout(nextSlide, sec);
}

function startShow() {
  const allSlides = document.querySelectorAll('.slide:not(#transitionSlide)');
  if (!allSlides.length) return;
  current = 0;
  allSlides[0].classList.add('active', 'visible');
  if (slideTimer) clearInterval(slideTimer);
  scheduleNext(allSlides[0]);
}

function nextSlide() {
  const allSlides = document.querySelectorAll('.slide:not(#transitionSlide)');
  if (!allSlides.length) return;
  const prev = current;
  current = (current + 1) % allSlides.length;
  const prevHasVideo = !!(allSlides[prev].querySelector('video') || allSlides[prev].querySelector('iframe'));
  const nextHasVideo = !!(allSlides[current].querySelector('video') || allSlides[current].querySelector('iframe'));
  showSlide(current, prevHasVideo || nextHasVideo);
  setTimeout(() => scheduleNext(allSlides[current]), prevHasVideo || nextHasVideo ? 2000 : 800);
}

// ── Refresh data without interrupting show ──
async function refreshData() {
  const ok = await loadData();
  if (ok) {
    renderSlides();
    buildTicker();
    // Don't restart the timer — just update content in place
  }
}

// ── Escape HTML ──
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
async function init() {
  const ok = await loadData();

  if (!ok || slides.length === 0) {
    document.getElementById('loadOverlay').innerHTML = `
      <img src="images/wholelife-logo-wide.jpg" alt="WholeLife" onerror="this.style.display='none'">
      <p style="color:rgba(255,255,255,.7)">Waiting for products… refreshing in 30 seconds</p>`;
    setTimeout(init, 30000);
    return;
  }

  renderSlides();
  buildTicker();
  document.getElementById('loadOverlay').style.display = 'none';
  // Preload all videos immediately
  document.querySelectorAll('.slide video').forEach(v => v.load());
  startShow();

  // Refresh every 5 minutes
  setInterval(refreshData, REFRESH_INTERVAL);
}

init();
</script>

</body>
</html>
