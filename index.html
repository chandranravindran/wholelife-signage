<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WholeLife Digital Signage</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple:#62457C;--orange:#DD6D09;--green:#B7B800;--red:#e03e3e;}
html,body{width:100vw;height:100vh;overflow:hidden;background:#fff;font-family:'Nunito',sans-serif;}

/* PROGRESS */
#progress{position:fixed;top:0;left:0;height:4px;width:0;background:linear-gradient(90deg,var(--purple),var(--orange),var(--green));z-index:999;}

/* PRODUCT SLIDE */
#productSlide{position:fixed;inset:0 0 12vh 0;display:grid;grid-template-columns:50% 50%;}

/* LEFT PANEL */
#infoPanel{display:flex;flex-direction:column;justify-content:center;padding:0 5% 0 7%;background:#fff;overflow:hidden;}

#pCat{font-size:clamp(13px,1.4vw,20px);font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--orange);margin-bottom:1.4vh;}
#pBrand{font-size:clamp(14px,1.5vw,22px);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#bbb;margin-bottom:1vh;}
#pNameBold{font-size:clamp(42px,6.5vw,96px);font-weight:900;line-height:0.95;color:var(--purple);}
#pNameLight{font-size:clamp(42px,6.5vw,96px);font-weight:300;line-height:0.95;color:var(--purple);margin-bottom:2vh;}
#pSize{font-size:clamp(13px,1.3vw,18px);font-weight:500;color:#ccc;letter-spacing:2px;margin-bottom:1.5vh;}
.rule{width:52px;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--orange),var(--green));margin-bottom:2vh;}
#pSub{font-size:clamp(13px,1.4vw,20px);font-weight:500;color:#aaa;line-height:1.85;max-width:520px;margin-bottom:2.5vh;}

/* PRICE */
.price-row{display:flex;align-items:flex-start;gap:4px;margin-bottom:1vh;}
.price-dollar{font-size:clamp(26px,3vw,44px);font-weight:900;color:var(--orange);margin-top:1.2vw;line-height:1;}
.price-whole{font-size:clamp(80px,12vw,160px);font-weight:900;color:var(--orange);line-height:1;letter-spacing:-4px;}
.price-cents{font-size:clamp(26px,3vw,44px);font-weight:900;color:var(--orange);margin-top:1.2vw;line-height:1;}
.price-ask{font-size:clamp(24px,2.8vw,40px);font-weight:700;color:var(--purple);padding:1.2vh 2.5vw;border:3px solid var(--purple);border-radius:10px;display:inline-block;}

/* WAS/SAVE */
.was-save{display:flex;align-items:center;gap:14px;margin-bottom:2.5vh;}
.was{font-size:clamp(13px,1.3vw,18px);color:#ccc;font-weight:700;text-decoration:line-through;text-decoration-color:var(--red);}
.save-badge{padding:6px 16px;background:var(--red);border-radius:5px;font-size:clamp(12px,1.2vw,16px);font-weight:900;color:#fff;}

/* TAGS */
#pTags{display:flex;gap:10px;flex-wrap:wrap;}
.tag{padding:8px 20px;border-radius:5px;font-size:clamp(11px,1.1vw,15px);font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.tag-purple{background:#f4f0f9;color:var(--purple);}
.tag-green{background:#f5f6e8;color:#5e5e00;}
.tag-orange{background:#fdf3ec;color:#a04800;}

/* RIGHT PANEL */
#imgPanel{position:relative;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#imgPanel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 52% 48%,rgba(98,69,124,0.07) 0%,transparent 68%);z-index:0;}
#wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.04;pointer-events:none;z-index:0;}
#wm img{width:76%;height:76%;object-fit:contain;}
#imgBox{position:relative;z-index:2;width:74%;height:86%;display:flex;align-items:center;justify-content:center;}
#imgBox img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 8px 32px rgba(98,69,124,0.18)) drop-shadow(0 24px 64px rgba(98,69,124,0.10)) drop-shadow(0 2px 6px rgba(0,0,0,0.06));}
.placeholder{font-size:clamp(80px,12vw,160px);opacity:0.06;}
#imgPanel::after{content:'';position:absolute;bottom:3%;left:50%;transform:translateX(-50%);width:36%;height:4%;background:radial-gradient(ellipse,rgba(98,69,124,0.14) 0%,transparent 70%);border-radius:50%;z-index:1;}

/* PROMO SLIDE */
#promoSlide{position:fixed;inset:0 0 12vh 0;display:none;align-items:center;justify-content:center;background:#000;z-index:10;}
#promoBox{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
#promoBox img{width:100%;height:100%;object-fit:contain;}

/* TRANSITION SCREEN */
#transitionScreen{position:fixed;inset:0;background:#1e0e35;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
.tr-top-bar{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--purple),var(--orange),var(--green));}
.tr-bot-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--orange),var(--purple));}
.tr-glow{position:absolute;width:50%;height:50%;border-radius:50%;background:radial-gradient(ellipse,rgba(98,69,124,0.65) 0%,transparent 70%);}
.tr-wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.05;pointer-events:none;}
.tr-wm img{width:80%;height:80%;object-fit:contain;}
.tr-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:20px;}
.tr-logo{height:clamp(50px,8vh,90px);object-fit:contain;filter:brightness(0) invert(1);opacity:0.85;}
.tr-bar-wrap{width:180px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.tr-bar{height:100%;background:linear-gradient(90deg,var(--orange),var(--green));border-radius:2px;animation:trBarAnim 1.5s ease-in-out infinite;}
@keyframes trBarAnim{0%{width:10%;margin-left:0}50%{width:50%;margin-left:25%}100%{width:10%;margin-left:90%}}

/* FOOTER TICKER */
#footer{position:fixed;bottom:0;left:0;right:0;height:12vh;background:var(--purple);display:flex;flex-direction:column;z-index:50;overflow:hidden;}
#footerTop{height:42%;background:var(--purple);display:flex;align-items:center;padding:0 2.5%;border-bottom:1px solid rgba(255,255,255,0.12);}
#footerLogo{height:clamp(18px,3.2vh,32px);object-fit:contain;filter:brightness(0) invert(1);opacity:0.85;}
#footerStoreName{margin-left:14px;font-size:clamp(10px,1.2vh,15px);font-weight:900;color:rgba(255,255,255,0.7);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;}
#footerStoreName span{color:var(--green);}
#footerClock{margin-left:auto;font-size:clamp(12px,1.4vh,18px);font-weight:800;color:rgba(255,255,255,0.6);font-variant-numeric:tabular-nums;letter-spacing:1px;}

#tickerBand{flex:1;background:rgba(0,0,0,0.15);display:flex;align-items:center;overflow:hidden;}
#tickerTrack{display:flex;align-items:center;white-space:nowrap;animation:tickScroll 55s linear infinite;}
@keyframes tickScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:center;gap:16px;padding:0 40px;font-size:clamp(12px,1.4vh,18px);font-weight:500;color:rgba(255,255,255,0.7);}
.tick-item .hi{color:#fff;font-weight:800;}
.tick-item .tgreen{color:var(--green);font-weight:700;}
.tick-item .torange{color:var(--orange);font-weight:700;}
.tick-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0;}

/* ANIMATIONS */
.anim{opacity:0;transform:translateY(28px);}
.anim.in{opacity:1;transform:translateY(0);}
.anim.out{opacity:0;transform:translateY(-16px);}
.d1{transition:opacity .5s  cubic-bezier(.16,1,.3,1) 0s,   transform .5s  cubic-bezier(.16,1,.3,1) 0s}
.d2{transition:opacity .55s cubic-bezier(.16,1,.3,1) .06s, transform .55s cubic-bezier(.16,1,.3,1) .06s}
.d3{transition:opacity .55s cubic-bezier(.16,1,.3,1) .12s, transform .55s cubic-bezier(.16,1,.3,1) .12s}
.d4{transition:opacity .55s cubic-bezier(.16,1,.3,1) .18s, transform .55s cubic-bezier(.16,1,.3,1) .18s}
.d5{transition:opacity .6s  cubic-bezier(.16,1,.3,1) .22s, transform .6s  cubic-bezier(.16,1,.3,1) .22s}
.d6{transition:opacity .6s  cubic-bezier(.16,1,.3,1) .28s, transform .6s  cubic-bezier(.16,1,.3,1) .28s}
.d7{transition:opacity .65s cubic-bezier(.16,1,.3,1) .34s, transform .65s cubic-bezier(.16,1,.3,1) .34s}
.anim.out.d1,.anim.out.d2,.anim.out.d3,.anim.out.d4,.anim.out.d5,.anim.out.d6,.anim.out.d7{transition:opacity .18s ease-in,transform .18s ease-in;}
.img-anim{opacity:0;transform:scale(.88) translateX(40px);}
.img-anim.in{opacity:1;transform:scale(1) translateX(0);transition:opacity .85s cubic-bezier(.16,1,.3,1) .1s,transform .85s cubic-bezier(.16,1,.3,1) .1s;}
.img-anim.out{opacity:0;transform:scale(.93) translateX(-24px);transition:opacity .18s ease-in,transform .18s ease-in;}
</style>
</head>
<body>

<div id="progress"></div>

<!-- PRODUCT SLIDE -->
<div id="productSlide">
  <div id="infoPanel">
    <div id="pCat"       class="anim d1"></div>
    <div id="pBrand"     class="anim d2"></div>
    <div id="pNameBold"  class="anim d3"></div>
    <div id="pNameLight" class="anim d3"></div>
    <div id="pSize"      class="anim d4"></div>
    <div class="rule     anim d4"></div>
    <div id="pSub"       class="anim d5"></div>
    <div id="priceRow"   class="anim d6"></div>
    <div id="pTags"      class="anim d7"></div>
  </div>
  <div id="imgPanel">
    <div id="wm"><img src="https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/images/wholelife-logo-wide.jpg" alt=""></div>
    <div id="imgBox" class="img-anim"></div>
  </div>
</div>

<!-- PROMO SLIDE -->
<div id="promoSlide"><div id="promoBox"></div></div>

<!-- TRANSITION SCREEN -->
<div id="transitionScreen">
  <div class="tr-top-bar"></div>
  <div class="tr-bot-bar"></div>
  <div class="tr-wm"><img src="https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/images/wholelife-logo-wide.jpg" alt=""></div>
  <div class="tr-glow"></div>
  <div class="tr-content">
    <img class="tr-logo" src="https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/images/wholelife-logo-wide.jpg" alt="WholeLife">
    <div class="tr-bar-wrap"><div class="tr-bar"></div></div>
  </div>
</div>

<!-- FOOTER -->
<div id="footer">
  <div id="footerTop">
    <img id="footerLogo" src="https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/images/wholelife-logo-wide.jpg" alt="WholeLife">
    <div id="footerStoreName">WHOLELIFE <span>PHARMACY &amp; HEALTHFOODS</span></div>
    <div id="footerClock"></div>
  </div>
  <div id="tickerBand">
    <div id="tickerTrack"></div>
  </div>
</div>

<script>
const GITHUB_RAW = 'https://raw.githubusercontent.com/chandranravindran/wholelife-signage/main/products.json';
const REFRESH_MS = 5 * 60 * 1000;
const PROMO_SEC  = 15;

let slides = [], settings = {}, cur = 0, slideTimer = null;

// LOAD
async function loadData() {
  try {
    const r = await fetch(GITHUB_RAW + '?t=' + Date.now());
    const d = await r.json();
    if (d.slides && d.slides.length) { slides = d.slides; settings = d.settings || {}; applySettings(); }
  } catch(e) { console.warn('Load error:', e); }
}

function applySettings() {
  buildTicker(settings.ticker_messages);
}

// CLOCK
function tickClock() {
  const n = new Date();
  document.getElementById('footerClock').textContent =
    n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}
setInterval(tickClock, 10000); tickClock();

// TICKER
function buildTicker(msgs) {
  const def = [
    {text:'Healthy living every day',        highlight:'Ask our pharmacist'},
    {text:"Australia's largest range of",    highlight:'health foods & organics'},
    {text:'Get Well · Stay Well ·',          highlight:'Live Well · Be Well'},
    {text:'Book your',                        highlight:'Flu Vaccination', after:'in-store today'},
    {text:'Vitamins · Supplements ·',         highlight:'Natural Beauty · Organics'},
    {text:'Vegan · Gluten Free ·',            highlight:'Dairy Free · Keto'},
    {text:'Guaranteed',                       highlight:'best prices every day'},
    {text:'Your local',                       highlight:'Pharmacy & Healthfoods', after:'store'},
  ];
  const list = (msgs && msgs.length) ? msgs : def;
  const track = document.getElementById('tickerTrack');
  track.innerHTML = '';
  // duplicate for seamless loop
  [...list, ...list].forEach(m => {
    const s = document.createElement('span');
    s.className = 'tick-item';
    s.innerHTML =
      '<span class="tick-dot"></span>' +
      (m.text || '') + ' ' +
      '<span class="' + (m.hiClass || 'hi') + '">' + (m.highlight || '') + '</span>' +
      (m.after ? ' ' + m.after : '');
    track.appendChild(s);
  });
}

// PROGRESS
function resetProg(sec) {
  const b = document.getElementById('progress');
  b.style.transition = 'none'; b.style.width = '0';
}
function startProg(sec) {
  const b = document.getElementById('progress');
  requestAnimationFrame(() => { b.style.transition = 'width ' + sec + 's linear'; b.style.width = '100%'; });
}
function scheduleNext(sec) {
  if (slideTimer) clearTimeout(slideTimer);
  slideTimer = setTimeout(() => next(), sec * 1000);
}

// SHOW
function show(idx) {
  if (!slides.length) return;
  cur = idx;
  const p = slides[idx];
  const SLIDE_SEC = settings.slide_seconds || 10;
  const isPromo = p.type === 'promo';
  const isVideo = isPromo && p.video_type === 'mp4' && p.youtube_url;
  const isYT    = isPromo && p.youtube_url && !isVideo;

  document.querySelectorAll('.anim').forEach(e => { e.classList.remove('in'); e.classList.add('out'); });
  const ib = document.getElementById('imgBox');
  ib.classList.remove('in'); ib.classList.add('out');

  setTimeout(() => {
    isPromo ? showPromo(p, isVideo, isYT, SLIDE_SEC) : showProduct(p, SLIDE_SEC);
  }, 240);
}

function showProduct(p, SLIDE_SEC) {
  document.getElementById('productSlide').style.display      = 'grid';
  document.getElementById('promoSlide').style.display        = 'none';
  document.getElementById('transitionScreen').style.display  = 'none';

  document.getElementById('pCat').textContent   = (p.category || 'Featured').toUpperCase();
  document.getElementById('pBrand').textContent = (p.brand || '').toUpperCase();

  // split name bold / light
  const name = p.name || '';
  let bold = name, light = '', sizeStr = '';
  const sizeRx = /(\d+\s*(?:tablets?|capsules?|caps?|softgels?|serves?|sachets?|g|mg|ml|l|kg)[\w\s\/]*)$/i;
  const sizeM  = name.match(sizeRx);
  if (sizeM) {
    const base   = name.slice(0, sizeM.index).trim().split(' ');
    sizeStr      = sizeM[1].trim();
    const mid    = Math.ceil(base.length / 2);
    bold  = base.slice(0, mid).join(' ');
    light = base.slice(mid).join(' ');
  } else {
    const words = name.split(' ');
    if (words.length >= 2) { const mid = Math.ceil(words.length / 2); bold = words.slice(0,mid).join(' '); light = words.slice(mid).join(' '); }
  }
  document.getElementById('pNameBold').textContent  = bold;
  document.getElementById('pNameLight').textContent = light;
  document.getElementById('pSize').textContent      = sizeStr;
  document.getElementById('pSub').textContent       = p.subtitle || '';

  // price
  const priceEl = document.getElementById('priceRow');
  priceEl.innerHTML = '';
  const price = parseFloat(p.price), was = parseFloat(p.was_price);
  if (price > 0) {
    const whole = Math.floor(price);
    const cents = Math.round((price - whole) * 100).toString().padStart(2,'0');
    const col   = document.createElement('div');
    col.style.cssText = 'display:flex;flex-direction:column;gap:0.8vh;';
    const pr = document.createElement('div'); pr.className = 'price-row';
    pr.innerHTML = `<span class="price-dollar">$</span><span class="price-whole">${whole}</span><span class="price-cents">.${cents}</span>`;
    col.appendChild(pr);
    if (was > 0 && was > price) {
      const ws = document.createElement('div'); ws.className = 'was-save';
      ws.innerHTML = `<span class="was">WAS $${was.toFixed(2)}</span><span class="save-badge">SAVE $${Math.round(was-price)}</span>`;
      col.appendChild(ws);
    }
    priceEl.appendChild(col);
  } else {
    const ask = document.createElement('div'); ask.className = 'price-ask'; ask.textContent = 'Ask in store'; priceEl.appendChild(ask);
  }

  // tags
  const tagsEl = document.getElementById('pTags'); tagsEl.innerHTML = '';
  const tagCls = ['tag-purple','tag-green','tag-orange','tag-purple'];
  if (p.tags) {
    p.tags.split(',').map(t=>t.trim()).filter(Boolean).slice(0,4).forEach((t,i) => {
      const s = document.createElement('span'); s.className = 'tag ' + tagCls[i%tagCls.length]; s.textContent = t; tagsEl.appendChild(s);
    });
  }

  // image
  const ib = document.getElementById('imgBox'); ib.innerHTML = '';
  const url = p.display_image || p.image_url;
  if (url) {
    const img = document.createElement('img'); img.src = url; img.alt = p.name; img.referrerPolicy = 'no-referrer';
    img.onerror = () => { ib.innerHTML = '<div class="placeholder">📦</div>'; }; ib.appendChild(img);
  } else { ib.innerHTML = '<div class="placeholder">📦</div>'; }

  requestAnimationFrame(() => {
    document.querySelectorAll('.anim').forEach(e => { e.classList.remove('out'); e.classList.add('in'); });
    ib.classList.remove('out'); ib.classList.add('in');
  });
  resetProg(SLIDE_SEC); setTimeout(() => startProg(SLIDE_SEC), 60); scheduleNext(SLIDE_SEC);
}

function showPromo(p, isVideo, isYT, SLIDE_SEC) {
  const prodSlide = document.getElementById('productSlide');
  const promoSlide = document.getElementById('promoSlide');
  const trScreen   = document.getElementById('transitionScreen');
  const pb         = document.getElementById('promoBox');
  prodSlide.style.display = 'none'; pb.innerHTML = '';

  if (isVideo) {
    promoSlide.style.display = 'none'; trScreen.style.display = 'flex';
    const vid = document.createElement('video');
    vid.src = p.youtube_url; vid.loop = false; vid.muted = false;
    vid.playsInline = true; vid.controls = false; vid.preload = 'auto';
    vid.style.cssText = 'position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.6s ease;';
    pb.appendChild(vid);
    const reveal = () => { trScreen.style.display='none'; promoSlide.style.display='flex'; vid.style.opacity='1'; vid.play().catch(()=>{vid.muted=true;vid.play();}); };
    vid.readyState >= 3 ? reveal() : vid.addEventListener('canplay', reveal, {once:true});
    vid.addEventListener('ended', () => next()); scheduleNext(180);
  } else if (isYT) {
    trScreen.style.display = 'none'; promoSlide.style.display = 'flex';
    const iframe = document.createElement('iframe');
    iframe.src = p.youtube_url; iframe.style.cssText = 'width:100%;height:100%;border:none;';
    iframe.allow = 'autoplay;fullscreen'; iframe.allowFullscreen = true; pb.appendChild(iframe); scheduleNext(180);
  } else {
    trScreen.style.display = 'none'; promoSlide.style.display = 'flex';
    if (p.display_image || p.image_url) {
      const img = document.createElement('img'); img.src = p.display_image || p.image_url; img.alt = p.name || ''; pb.appendChild(img);
    }
    resetProg(PROMO_SEC); setTimeout(()=>startProg(PROMO_SEC),60); scheduleNext(PROMO_SEC);
  }
}

function next() { show((cur+1) % slides.length); }

async function boot() {
  buildTicker(null);
  await loadData();
  if (slides.length) { show(0); }
  setInterval(async () => { await loadData(); }, REFRESH_MS);
}
boot();
</script>
</body>
</html>
